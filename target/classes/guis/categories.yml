# Check the documentation for more information:
# https://airdevelopment.gitbook.io/docs/airauctions/configuration/gui

# - true = Opens Category GUI instead of Main GUI
# - false = Opens Main GUI instead
enabled: true

# GUI title and size
title: "<gradient:#5efce8:#736efe><bold>Browse Categories</bold></gradient>"
rows: 6

items:
  filler:
    slots: [0-9, 17, 18, 26, 27, 35, 36, 44-52]
    material: BLACK_STAINED_GLASS_PANE
    hide-tooltip: true

  cat-all:
    slots: [13]
    material: COMPASS
    glow: true
    display-name: "<#5efce8><bold>All Listings</bold></#5efce8>"
    lore:
      - "<dark_gray>Global Market</dark_gray>"
      - ""
      - "<gray>Browse every item currently</gray>"
      - "<gray>available on the market.</gray>"
      - ""
      - "<#5efce8>Click</#5efce8> <gray>to view all</gray>"
    actions:
      - "[open] gui:auction_house filter:all sort:%sort%"
      - "[sound] ui.button.click 1 1.2"

  cat-combat:
    slots: [28]
    material: NETHERITE_SWORD
    display-name: "<#ff5f6d><bold>Combat & Defense</bold></#ff5f6d>"
    lore:
      - "<dark_gray>Armory</dark_gray>"
      - ""
      - "<gray>Equip yourself with the</gray>"
      - "<gray>finest blades and armor.</gray>"
      - ""
      - "<#ff5f6d>Click</#ff5f6d> <gray>to browse gear</gray>"
    actions:
      - "[open] gui:auction_house filter:combat sort:%sort%"
      - "[sound] ui.button.click 1 1"
    item-flags:
      - HIDE_ATTRIBUTES

  cat-tools:
    slots: [29]
    material: DIAMOND_PICKAXE
    display-name: "<#5efce8><bold>Tools & Utility</bold></#5efce8>"
    lore:
