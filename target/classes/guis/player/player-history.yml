# Check the documentation for more information:
# https://airdevelopment.gitbook.io/docs/airauctions/configuration/gui

# - true = buttons are always shown
# - false = buttons only appear when next/previous page is available
always-show-buttons: false

# GUI title and size
title: "<gradient:#5efce8:#736efe><bold>History</bold></gradient> <gray>»</gray> <dark_gray>(%page%/%pages%)</dark_gray>"
rows: 6

# Dynamic slot groups
# These define where the item auction slots will be placed
auction-slots: [10-16, 19-25, 28-34]

# This is how auction item (bought) will be displayed inside auction-slots
auction-item-bought:
  lore:
    - "%lore%"
    - "<dark_gray>Auction ID: %id%"
    - ""
    - "<gray>Listing Information:</gray>"
    - " <#736efe>»</#736efe> <gray>Seller:</gray> <white>%seller%</white>"
    - " <#736efe>»</#736efe> <gray>Price was worth:</gray> %price%"
    - " <#736efe>»</#736efe> <gray>Amount:</gray> <white>x%amount%</white>"
    - " <#736efe>»</#736efe> <gray>Category:</gray> <white>%filter%</white>"
    - " <#736efe>»</#736efe> <gray>Purchased:</gray> <white>%date%</white> <dark_gray>@</dark_gray> <white>%time%</white>"
    - ""
    - "preview: <#f9f047>Shift-Click</#f9f047> <gray>to preview contents</gray>"
  item-flags:
    - HIDE_ATTRIBUTES
  shift-actions:
    - "[preview]"

# This is how auction item (sold) will be displayed inside auction-slots
auction-item-sold:
  lore:
    - "%lore%"
    - "<dark_gray>Auction ID: %id%"
    - ""
    - "<gray>Listing Information:</gray>"
    - " <#736efe>»</#736efe> <gray>Buyer:</gray> <white>%buyer%</white>"
    - " <#736efe>»</#736efe> <gray>Price was worth:</gray> %price%"
    - " <#736efe>»</#736efe> <gray>Amount:</gray> <white>x%amount%</white>"
    - " <#736efe>»</#736efe> <gray>Category:</gray> <white>%filter%</white>"
    - " <#736efe>»</#736efe> <gray>Sold on:</gray> <white>%date%</white> <dark_gray>@</dark_gray> <white>%time%</white>"
    - ""
    - "preview: <#f9f047>Shift-Click</#f9f047> <gray>to preview contents</gray>"
  item-flags:
    - HIDE_ATTRIBUTES
  shift-actions:
    - "[preview]"

# GUI buttons
# Special items with fixed actions in the GUI.
# You can customize their appearance (glow, enchants, tooltips, actions, etc.).
buttons:
  next-page:
    slots: [26]
    material: SPECTRAL_ARROW
    display-name: "<#5efce8>Next Page</#5efce8>"
    lore:
      - "<gray>Navigate to next page</gray>"
    actions:
      - "[sound] ui.button.click 1 1.2"
    cooldown: 0.2

  previous-page:
    slots: [18]
    material: SPECTRAL_ARROW
    display-name: "<#5efce8>Previous Page</#5efce8>"
    lore:
      - "<gray>Return to previous page</gray>"
    actions:
      - "[sound] ui.button.click 1 1.2"
    cooldown: 0.2

  refresh:
    slots: [49]
    material: SUNFLOWER
    display-name: "<#f9f047><bold>Refresh Listings</bold></#f9f047>"
    lore:
      - "<gray>Update your expired listings</gray>"
      - "<gray>and check for updates.</gray>"
    actions:
      - "[sound] ui.button.click 1 1.5"
    cooldown: 5

# Custom items
items:
  filler:
    slots: [0-2, 6-9, 17, 27, 35-44]
    material: BLACK_STAINED_GLASS_PANE
    hide-tooltip: true

  auction-house:
    slots: [3]
    material: COPPER_INGOT
    display-name: "<#bdc3c7><bold>Marketplace</bold></#bdc3c7>"
    lore:
      - "<dark_gray>Global Terminal</dark_gray>"
      - ""
      - "<gray>Return to the main market</gray>"
      - "<gray>to browse other listings.</gray>"
      - ""
      - "<#5efce8>Click</#5efce8> <gray>to go back</gray>"
    actions:
      - "[open] gui:auction_house filter:%filter% sort:%sort%"
      - "[sound] ui.button.click 1 1.2"

  my-listings:
    slots: [4]
    material: IRON_INGOT
    display-name: "<#5efce8><bold>Your Listings</bold></#5efce8>"
    lore:
      - "<dark_gray>Management</dark_gray>"
      - ""
      - "<gray>Manage your active sales</gray>"
      - "<gray>and check your limits.</gray>"
      - ""
      - "<#5efce8>Click</#5efce8> <gray>to view listings</gray>"
    actions:
      - "[open] gui:player_listings filter:%filter% sort:%sort%"
      - "[sound] ui.button.click 1 1.2"

  history:
    slots: [5]
    material: GOLD_INGOT
    glow: true
    display-name: "<#ffbd3f><bold>Sales History</bold></#ffbd3f>"
    lore:
      - "<dark_gray>Transaction Logs</dark_gray>"
      - ""
      - " <#736efe>»</#736efe> <gray>Status:</gray> <#5efce8>Currently Viewing</#5efce8>"

  close:
    slots: [53]
    material: BARRIER
    display-name: "<#ff5f6d><bold>Close Menu</bold></#ff5f6d>"
    lore:
      - "<gray>Return to game.</gray>"
    actions:
      - "[close]"
      - "[sound] ui.button.click 1 0.8"

  no-next-page:
    slots: [26]
    material: ARROW
    display-name: "<dark_gray>Next Page</dark_gray>"
    lore:
      - "<#ff5f6d>Last page reached</#ff5f6d>"

  no-previous-page:
    slots: [18]
    material: ARROW
    display-name: "<dark_gray>Previous Page</dark_gray>"
    lore:
      - "<#ff5f6d>First page reached</#ff5f6d>"