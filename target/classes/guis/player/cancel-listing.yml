# GUI title and size
title: "<gradient:#5efce8:#736efe><bold>Cancel Listing</bold></gradient>"
rows: 3

# Dynamic slot groups
# This define where the item auction slot will be placed
auction-slot: [13]

# This is how auction item will be displayed inside auction-slots
auction-item:
  lore:
    - "%lore%"
    - "<dark_gray>Auction ID: %id%"
    - ""
    - "<gray>Listing Details:</gray>"
    - " <#736efe>»</#736efe> <gray>Original Price:</gray> %price%"
    - " <#736efe>»</#736efe> <gray>Amount:</gray> <white>x%amount%</white>"
    - " <#736efe>»</#736efe> <gray>Category:</gray> <white>%filter%</white>"
  item-flags:
    - HIDE_ATTRIBUTES

# GUI buttons
# Special items with fixed actions in the GUI.
# You can customize their appearance (glow, enchants, tooltips, actions, etc.).
buttons:
  confirm:
    slots: [11]
    material: LIME_STAINED_GLASS_PANE
    glow: true
    display-name: "<#85E52A><bold>CONFIRM CANCELLATION</bold></#85E52A>"
    lore:
      - "<gray>Click to remove this listing</gray>"
      - "<gray>from the market and return</gray>"
      - "<gray>it to your inventory.</gray>"
      - ""
      - "<#85E52A>▶ Proceed with removal</#85E52A>"
    actions:
      - "[sound] entity.player.levelup 0.8 2"

  cancel:
    slots: [15]
    material: RED_STAINED_GLASS_PANE
    display-name: "<#D94121><bold>KEEP LISTING</bold></#D94121>"
    lore:
      - "<gray>Click to abort and keep</gray>"
      - "<gray>your item for sale.</gray>"
      - ""
      - "<#D94121>▶ Return to listings</#D94121>"
    actions:
      - "[sound] ui.button.click 0.3 1"

# Custom items
items:
  filler:
    slots: [0-26]
    material: BLACK_STAINED_GLASS_PANE
    hide-tooltip: true