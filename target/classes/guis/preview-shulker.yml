# Opens on Auction House GUI
auction-house:
  # GUI title and size
  title: "<gradient:#5efce8:#736efe><bold>Shulker Preview</bold></gradient> <gray>»</gray> <white>Market</white>"
  rows: 6

  # Dynamic slot groups
  # This define where the item auction slot will be placed
  auction-slot: [4]

  # This is how auction item will be displayed inside auction-slots
  auction-item:
    lore:
      - "%lore%"
      - "<dark_gray>Auction ID: %id%"
      - ""
      - "<gray>Package Details:</gray>"
      - " <#736efe>»</#736efe> <gray>Seller:</gray> <white>%seller%</white>"
      - " <#736efe>»</#736efe> <gray>Price:</gray> %price%"
      - " <#736efe>»</#736efe> <gray>Amount:</gray> <white>x%amount%</white>"
      - " <#736efe>»</#736efe> <gray>Category:</gray> <white>%filter%</white>"
      - " <#736efe>»</#736efe> <gray>Expires:</gray> <white>%expire%</white>"
    item-flags:
      - HIDE_ATTRIBUTES

  # These define where the shulker items slots will be placed
  preview-slots: [18-44]

  # GUI buttons
  buttons:
    back:
      slots: [0]
      material: ARROW
      display-name: "<#ff5f6d><bold>Return to Market</bold></#ff5f6d>"
      lore:
        - "<gray>Click to exit preview</gray>"
        - "<gray>and return to listings.</gray>"
      actions:
        - "[sound] ui.button.click 1 0.8"

  # Custom items
  items:
    filler:
      slots: [1-3, 5-17, 45-53]
      material: BLACK_STAINED_GLASS_PANE
      hide-tooltip: true

