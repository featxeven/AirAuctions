# ----------------------------------
# AirAuctions Language Configuration
# ----------------------------------
# General Notes:
# - Set a message to "" to hide it.
# - All messages support full MiniMessage formatting.
# - External placeholders are supported when PlaceholderAPI is installed.
#
# Supported Inline Tags (usable inside any message):
#   <sound:NAME:VOLUME:PITCH>
#       - Plays a sound to the player
#
#   <title:'TEXT':fadeIn:stay:fadeOut>
#       - Shows a title with timing values (in ticks)
#
#   <subtitle:'TEXT'>
#       - Shows a subtitle (uses the last title timings)
#
#   <actionbar:'TEXT'>
#       - Shows text in the action bar
#
#   <bossbar:'TEXT':duration:color:progress:countdown>
#       TEXT      = The message displayed in the boss bar.
#       duration  = How long to display (ticks, 20 ticks = 1 second).
#       color     = Bar color (RED, BLUE, GREEN, YELLOW, PURPLE, WHITE, PINK).
#       overlay   = Appearance (PROGRESS, NOTCHED_6, NOTCHED_10, NOTCHED_12, NOTCHED_20).
#       progress  = Initial fill (0.0 to 1.0).
#       countdown = If true, the bar animates from the 'progress' value down to 0 over the duration.

# -----------------------------
# GENERAL
# -----------------------------
general:
  prefix: "<gray>[<gradient:#00ffcc:#0066ff>AirAuctions</gradient>]</gray>"

  plugin-usage: "%prefix% <white>Available commands:</white>
    <newline><gray>  • <yellow>/airauctions reload</yellow> <dark_gray>| <gray>Refresh configs</gray>
    <newline><gray>  • <yellow>/airauctions version</yellow> <dark_gray>| <gray>Display plugin version</gray>"

  plugin-version: "%prefix% <white>Running version <gradient:#00ffcc:#0066ff>%version%</gradient></white>"
  plugin-reloaded: "<sound:block.note_block.chime:1:2>%prefix% <green>Plugin reloaded successfully!</green>"
  plugin-outdated: "%prefix% <red>A new update is available!</red>
      <newline><gray>  • Current: <white>%current%</white>
      <newline><gray>  • Latest: <green>%latest%</green>
      <newline><gray>  • Download: <yellow><click:open_url:'https://www.spigotmc.org/resources/133357/'>[Click Here]</click></yellow>"

# -----------------------------
# PLACEHOLDERS
# -----------------------------
placeholders:
  second: " second"
  seconds: " seconds"
  minute: " minute"
  minutes: " minutes"
  hour: " hour"
  hours: " hours"
  day: " day"
  days: " days"
  purge-never: "<#ff5f6d><italic>Never</italic></#ff5f6d>"

# -----------------------------
# AUCTIONS
# -----------------------------
auctions:
  sell:
    error:
      holding-air: "%prefix% <#ff5f6d>You must be holding an item to list it!</#ff5f6d><sound:block.note_block.didgeridoo:1:0.5>"
      invalid-price: "%prefix% <#ff5f6d>Price must be a valid number.</#ff5f6d>"
      invalid-amount: "%prefix% <#ff5f6d>Amount must be a positive number.</#ff5f6d>"
      amount-required: "%prefix% <#ff5f6d>You need to specific an amount.</#ff5f6d>"
      insufficient-item: "%prefix% <#ff5f6d>You only have <white>%holding%</white> of that item!</#ff5f6d>"
      min-price: "%prefix% <#ff5f6d>Minimum listing price is <gold>%min%</gold>"
      max-price: "%prefix% <#ff5f6d>Maximum listing price is <gold>%max%</gold>"
      cooldown: "%prefix% <#ff5f6d>Slow down! Wait <white>%time%</white> before listing again.</#ff5f6d>"
      blocked-gamemode: "%prefix% <#ff5f6d>Auctions are restricted in your current gamemode."
      disabled-world: "%prefix% <#ff5f6d>Auctions are not allowed in <white>%world%</white>."
      damaged-item: "%prefix% <#ff5f6d>Buyers don't want junk! Damaged items cannot be sold.</#ff5f6d>"
      limit-reached: "%prefix% <#ff5f6d>Listing limit reached! <gray>(Max: %limit%)</gray></#ff5f6d>"
      expired-limit-reached: "%prefix% <#ff5f6d>Clean up your <white>Expired Items</white> before listing more! (limit is %limit%)</#ff5f6d>"
      blacklisted: "%prefix% <#ff5f6d>This item is forbidden from the market.</#ff5f6d>"
      not-whitelisted: "%prefix% <#ff5f6d>This item is not approved for trade.</#ff5f6d>"

    confirmation:
      request: "%prefix% <white>Listing <aqua>%amount%x %item%</aqua> for <gold>%price%</gold>.<newline>%prefix% <gray>Fee: <red>%fee%</red>. <yellow>Type again to confirm.</yellow>"
      expired: "%prefix% <#ff5f6d>Sale confirmation for <white>%item%</white> expired.</#ff5f6d>"

    success: "%prefix% <green>Market listing created!</green> <gray>(<aqua>%amount%x %item%</aqua> for <gold>%price%</gold>)</gray>
    <newline>%prefix% <gray>Listing Fee: <red>%fee%</red> <dark_gray>| <gray>Status: <green>Active</green><sound:entity.player.levelup:1:2><actionbar:'<green>Item listed for <gold>%price%</gold>!</green>'>"
    success-broadcast: "%prefix% <green>%player% has just listed <gray>(<aqua>%amount%x %item%</aqua> for <gold>%price%</gold>)</gray> on the Auction House!"
    sold: "%prefix% <gradient:#00ffcc:#0066ff><bold>ITEM SOLD!</bold></gradient> <white>%amount%x %item%</white> was bought by <yellow>%buyer%</yellow>.
    <newline>%prefix% <gray>Payout: <gold>%price%</gold> <dark_gray>| <gray>Profit: <green>%profit%</green>"

  buy:
    error:
      cannot-purchase-own: "%prefix% <#ff5f6d>You can't buy your own stock!</#ff5f6d>"
      insufficient-funds: "%prefix% <#ff5f6d>Insufficient balance! You need <gold>%amount%</gold>.</#ff5f6d><sound:block.note_block.didgeridoo:1:0.5>"
      inventory-full: "%prefix% <#ff5f6d>Inventory full! Make some space first.</#ff5f6d>"

    success: "%prefix% <green>Purchase complete!</green> <white>%amount%x %item%</white> for <gold>%price%</gold>.<sound:entity.experience_orb.pickup:1:1>"
    inventory-full-dropped: "%prefix% <gold>Inventory full! <italic>Your item was dropped at your feet.</italic></gold>"

  cancel:
    error:
      inventory-full: "%prefix% <#ff5f6d>Inventory full! Clear space to reclaim this.</#ff5f6d>"

    success: "%prefix% <green>Listing withdrawn.</green> <gray>(Returned <white>%amount%x %item%</white>)</gray>"
    moved-to-expired: "%prefix% <yellow>Listing ended.</yellow> <gray>Claim your items from <white>Expired Listings</white>."
    inventory-full-dropped: "%prefix% <#ff5f6d>Reclaimed item dropped on the ground (Inventory Full).</#ff5f6d>"

# -----------------------------
# GENERAL ERRORS
# -----------------------------
errors:
  no-permission: "%prefix% <#ff5f6d>Access Denied!</#ff5f6d> <gray>(Missing: <dark_red>%permission%</dark_red>)</gray>"
  incorrect-usage: "%prefix% <#ff5f6d>Correct usage:</#ff5f6d> <white>%usage%</white>"
  player-never-joined: "%prefix% <#ff5f6d>That player never joined the server before.</#ff5f6d>"
  player-not-found: "%prefix% <#ff5f6d>Player not found.</#ff5f6d>"
  search-query-too-long: "%prefix% <#ff5f6d>Search query too long! <gray>(%length%/%limit%)</gray></#ff5f6d>"
  item-unavailable: "%prefix% <#ff5f6d>This item has already been claimed or sold.</#ff5f6d>"
  cannot-afford-fee: "%prefix% <#ff5f6d>You can't afford the <gold>%fee%</gold> listing fee!</#ff5f6d>"
  # Triggers when error-on-excess-args is on true
  too-many-arguments: "%prefix% <#ff5f6d>Too many arguments!</#ff5f6d> <gray>Use: <white>%usage%</white></gray>"