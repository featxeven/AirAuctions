# - true = buttons are always shown
# - false = buttons only appear when next/previous page is available
always-show-buttons: false

# GUI title and size
title: "<gradient:#5efce8:#736efe><bold>%target% History</bold></gradient> <gray>»</gray> <white>%filter%</white> <dark_gray>(%page%/%pages%)</dark_gray>"
rows: 6

# Dynamic slot groups
# These define where the item auction slots will be placed
auction-slots: [10-16, 19-25, 28-34]

# This is how auction item (bought) will be displayed inside auction-slots
auction-item-bought:
  lore:
    - "%lore%" # The item's lore. If there is no lore, skip this line
    - "<dark_gray>Auction ID: %id%"
    - ""
    - "<gray>Listing Information:</gray>"
    - " <#736efe>»</#736efe> <gray>Bought from:</gray> <white>%seller%</white>"
    - " <#736efe>»</#736efe> <gray>Price was worth:</gray> %price%"
    - " <#736efe>»</#736efe> <gray>Amount:</gray> <white>x%amount%</white>"
    - " <#736efe>»</#736efe> <gray>Category:</gray> <white>%filter%</white>"
    - " <#736efe>»</#736efe> <gray>Purchased:</gray> <white>%date%</white> <dark_gray>@</dark_gray> <white>%time%</white>"
    - "preview: "
    - "preview: <#f9f047>Shift-Click</#f9f047> <gray>to preview contents</gray>"
  item-flags:
    - HIDE_ATTRIBUTES
  shift-actions:
    - "[sound] ui.button.click 1 2"
    - "[preview]"

# This is how auction item (sold) will be displayed inside auction-slots
auction-item-sold:
  lore:
    - "%lore%" # The item's lore. If there is no lore, skip this line
    - "<dark_gray>Auction ID: %id%"
    - ""
    - "<gray>Listing Information:</gray>"
    - " <#736efe>»</#736efe> <gray>Sold to:</gray> <white>%buyer%</white>"
    - " <#736efe>»</#736efe> <gray>Price was worth:</gray> %price%"
    - " <#736efe>»</#736efe> <gray>Amount:</gray> <white>x%amount%</white>"
    - " <#736efe>»</#736efe> <gray>Category:</gray> <white>%filter%</white>"
    - " <#736efe>»</#736efe> <gray>Sold on:</gray> <white>%date%</white> <dark_gray>@</dark_gray> <white>%time%</white>"
    - "preview: "
    - "preview: <#f9f047>Shift-Click</#f9f047> <gray>to preview contents</gray>"
  item-flags:
    - HIDE_ATTRIBUTES
  shift-actions:
    - "[sound] ui.button.click 1 2"
    - "[preview]"

# GUI buttons
buttons:
  next-page:
    slots: [26]
    material: SPECTRAL_ARROW
    display-name: "<#5efce8>Next Page</#5efce8>"
    lore:
      - "<gray>Navigate to next page</gray>"
    actions:
      - "[sound] ui.button.click 1 1.2"
    cooldown: 0.2

  previous-page:
    slots: [18]
    material: SPECTRAL_ARROW
    display-name: "<#5efce8>Previous Page</#5efce8>"
    lore:
      - "<gray>Return to previous page</gray>"
    actions:
      - "[sound] ui.button.click 1 1.2"
    cooldown: 0.2

  refresh:
    slots: [49]
    material: SUNFLOWER
    display-name: "<#f9f047><bold>Refresh Listings</bold></#f9f047>"
    lore:
      - "<gray>Update %target%'s current sales</gray>"
      - "<gray>and check for updates.</gray>"
    actions:
      - "[sound] ui.button.click 1 1.5"
    cooldown: 5

# Custom items
items:
  filler:
    slots: [1-3, 5-9, 17, 27, 35-44]
    material: BLACK_STAINED_GLASS_PANE
    hide-tooltip: true

  target-head:
    slots: [4]
    material: head-%target%
    display-name: "<#bdc3c7><bold>%target%</bold></#bdc3c7><white>'s History"

  back:
    slots: [0]
    material: ARROW
    display-name: "<#bdc3c7><bold>Go back</bold></#bdc3c7>"
    lore:
      - "<gray>Return to %target%'s listings</gray>"
      - ""
      - "<#5efce8>Click</#5efce8> <gray>to go back</gray>"
    actions:
      - "[open] gui:target_listings filter:%filter% sort:%sort% target:%target%"
      - "[sound] ui.button.click 1 1.2"

  close:
    slots: [53]
    material: BARRIER
    display-name: "<#ff5f6d><bold>Close Menu</bold></#ff5f6d>"
    lore:
      - "<gray>Return to game.</gray>"
    actions:
      - "[close]"
      - "[sound] ui.button.click 1 0.8"

  no-next-page:
    slots: [26]
    material: ARROW
    display-name: "<dark_gray>Next Page</dark_gray>"
    lore:
      - "<#ff5f6d>Last page reached</#ff5f6d>"

  no-previous-page:
    slots: [18]
    material: ARROW
    display-name: "<dark_gray>Previous Page</dark_gray>"
    lore:
      - "<#ff5f6d>First page reached</#ff5f6d>"