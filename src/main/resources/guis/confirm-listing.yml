# - true = Opens Confirmation GUI
# - false = Sends confirmation message in chat
enabled: true

# GUI title and size
title: "<gradient:#5efce8:#736efe><bold>Confirm Listing</bold></gradient>"
rows: 3

# Dynamic slot groups
# This define where the item auction slot will be placed
auction-slot: [13]

# This is how auction item will be displayed inside auction-slots
auction-item:
  lore:
    - "%lore%" # The item's lore. If there is no lore, skip this line
    - " "
    - "<gray>Listing Summary:</gray>"
    - " <#736efe>»</#736efe> <gray>Price:</gray> %price%"
    - " <#736efe>»</#736efe> <gray>Listing Fee:</gray> <red>-%fee%</red>"
    - " <#736efe>»</#736efe> <gray>Amount:</gray> <white>x%amount%</white>"
  item-flags:
    - HIDE_ATTRIBUTES

# GUI buttons
# Special items with fixed actions in the GUI.
# You can customize their appearance (glow, enchants, tooltips, actions, etc.).
buttons:
  confirm:
    slots: [11]
    material: LIME_STAINED_GLASS_PANE
    glow: true
    display-name: "<#85E52A><bold>CONFIRM AUCTION</bold></#85E52A>"
    lore:
      - "<gray>Click to list this item</gray>"
      - "<gray>on the public market.</gray>"
      - " "
      - "<gray>Listing Cost: <red>%fee%</red></gray>"
      - " <#736efe>»</#736efe> <gold><bold>Price: %price%"
      - " "
      - "<#85E52A>▶ Confirm & Pay Fee</#85E52A>"
    actions:
      - "[sound] entity.player.levelup 0.8 2"

  cancel:
    slots: [15]
    material: RED_STAINED_GLASS_PANE
    display-name: "<#D94121><bold>CANCEL</bold></#D94121>"
    lore:
      - "<gray>Click to abort and return</gray>"
      - "<gray>the item to your inventory.</gray>"
      - " "
      - "<#D94121>▶ Stop listing</#D94121>"
    actions:
      - "[sound] ui.button.click 0.3 1"

# Custom items
items:
  filler:
    slots: [0-26]
    material: BLACK_STAINED_GLASS_PANE
    hide-tooltip: true