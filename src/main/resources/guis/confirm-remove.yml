# - true = Opens Remove Confirm GUI
# - false = Sends confirmation message in chat
enabled: true

# GUI title and size
title: "<gradient:#5efce8:#736efe><bold>Remove %target%'s Listing</bold></gradient>"
rows: 6

# Dynamic slot groups
# These define where the item auction slots will be placed
auction-slot: [13]

# This is how auction item will be displayed inside auction-slots
auction-item:
  lore:
    - "%lore%"
    - "<dark_gray>Auction ID: %id%"
    - ""
    - "<gray>Listing Information:</gray>"
    - " <#736efe>»</#736efe> <gray>Seller:</gray> <white>%target%</white>"
    - " <#736efe>»</#736efe> <gray>Price:</gray> %price%"
    - " <#736efe>»</#736efe> <gray>Amount:</gray> <white>x%amount%</white>"
    - " <#736efe>»</#736efe> <gray>Category:</gray> <white>%filter%</white>"
  item-flags:
    - HIDE_ATTRIBUTES

# GUI buttons
# Special items with fixed actions in the GUI.
# You can customize their appearance (glow, enchants, tooltips, actions, etc.).
buttons:
  confirm:
    slots: [11]
    material: LIME_STAINED_GLASS_PANE
    glow: true
    display-name: "<#85E52A><bold>REMOVE</bold></#85E52A>"
    lore:
      - "<gray>Click to remove item</gray>"
      - "<gray>from the public market.</gray>"
      - ""
      - "<#85E52A>▶ Confirm Removal</#85E52A>"
    actions:
      - "[sound] entity.player.levelup 0.8 2"

  cancel:
    slots: [15]
    material: RED_STAINED_GLASS_PANE
    display-name: "<#D94121><bold>CANCEL</bold></#D94121>"
    lore:
      - "<gray>Click to cancel this action.</gray>"
    actions:
      - "[sound] ui.button.click 0.3 1"

# Custom items
items:
  filler:
    slots: [0-26]
    material: BLACK_STAINED_GLASS_PANE
    hide-tooltip: true