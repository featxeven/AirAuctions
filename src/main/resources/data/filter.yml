# -------------------------------
# Item Filter Configuration
# -------------------------------
# This file handles how items are categorized in the Auction House.
# The order of sections here determines the cycle order in the GUI.
#
# - You can add, remove, or rename these sections as you like.
# - Changing the 'display-name' updates what players see in the GUI.
#
# Note: Items not categorized in any section will still show up in the 'all' filter.

all:
  display-name: "All"

# -------------------------------
# Combat
# -------------------------------
combat:
  display-name: "Combat"
  match-rules:
    # Match items by Custom Model Data
    # Format: "123" (any item with CMD 123) or "PAPER:123" (specific material)
    # custom-model-data:
    #   - "1001"
    #   - "PAPER:1002"

    # 1.21.2+ Item Model support
    # item-models:
    #   - "minecraft:mymodels/epic_sword"
    #   - "custom:ruby_spear"

    # Match Nexo, ItemsAdder or CraftEngine items
    # special-items:
    #   - "nexo:item_id"
    #   - "itemsadder:item_id"
    #   - "craftengine:item_id"

    # Match by keywords in the item's name
    # names:
    #   - "Spear"
    #   - "Dagger"
    #   - "Battleaxe"
    materials:
      # Wooden
      - wooden_spear
      - wooden_sword
      # Stone
      - stone_spear
      - stone_sword
      # Copper
      - copper_spear
      - copper_sword
      - copper_helmet
      - copper_chestplate
      - copper_leggings
      - copper_boots
      # Iron
      - iron_spear
      - iron_sword
      - iron_helmet
      - iron_chestplate
      - iron_leggings
      - iron_boots
      # Golden
      - golden_spear
      - golden_sword
      - golden_helmet
      - golden_chestplate
      - golden_leggings
      - golden_boots
      # Diamond
      - diamond_spear
      - diamond_sword
      - diamond_helmet
      - diamond_chestplate
      - diamond_leggings
      - diamond_boots
      # Netherite
      - netherite_spear
      - netherite_sword
      - netherite_helmet
      - netherite_chestplate
      - netherite_leggings
      - netherite_boots
      # Leather & Chainmail
      - leather_helmet
      - leather_chestplate
      - leather_leggings
      - leather_boots
      - chainmail_helmet
      - chainmail_chestplate
      - chainmail_leggings
      - chainmail_boots
      # Ranged & special combat items
      - bow
      - crossbow
      - trident
      - mace
      - elytra
      - turtle_helmet
      - wolf_armor
      - shield
      - totem_of_undying
      - end_crystal
      - wind_charge
      # Horse armor
      - leather_horse_armor
      - iron_horse_armor
      - golden_horse_armor
      - diamond_horse_armor
      - copper_horse_armor
      - netherite_horse_armor
      # Nautilus armor
      - copper_nautilus_armor
      - iron_nautilus_armor
