      - diamond_nautilus_armor
      - netherite_nautilus_armor
      # Harnesses
      - white_harness
      - orange_harness
      - magenta_harness
      - light_blue_harness
      - yellow_harness
      - lime_harness
      - pink_harness
      - gray_harness
      - light_gray_harness
      - cyan_harness
      - purple_harness
      - blue_harness
