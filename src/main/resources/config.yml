# ╔══════════════════════════════════════════════════════╗
# ║           AIRAUCTIONS — MAIN CONFIGURATION           ║
# ║  docs: https://airdevelopment.gitbook.io/docs/       ║
# ╚══════════════════════════════════════════════════════╝

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  GENERAL
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
notify-updates: true               # Notify admins when a new update is available
lang: "en_US"                      # Locale file name (lang/messages/KEY.yml)
error-on-excess-args: true         # Show an error if too many arguments are passed to a command

# true:  Always reopens the GUI when using certain buttons (useful for placeholder-driven titles)
# false: Only refreshes the auction slots
force-update-gui: true

# true:  Empty ("") lines are hidden UNLESS a visible line follows them
# false: All lines are shown regardless of content
skip-empty-lines: true

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  FORMATTING
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Time formatting used across the plugin and in placeholders
# Modes:
#   DETAILED   - all relevant units  ("2 days 3 hours 4 minutes 20 seconds")
#   SEQUENTIAL - one unit at a time  (used for progressive messages)
#   CUSTOM     - up to N units       (useful for compact displays)
time-format:
  mode: CUSTOM
  granularity: 2   # Only used when mode = CUSTOM (1 = largest unit only, 4 = full breakdown)

# Date formatting used in GUIs
# Examples:
#   dd/MM/yy      -> 08/03/26
#   dd MMM        -> 08 Mar
#   MMMM dd, yyyy -> March 08, 2026
#   E, dd MMM     -> Sun, 08 Mar
date-format: "dd/MM/yy"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  AUCTIONS
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
auctions:
  # --- Limits & Timers ---
  max-listings: 3                  # Max active listings per player (bypass: airauctions.bypass.limit.<#>)
  history-item-limit: 50           # Max entries in player history GUI         (-1 = unlimited)
  expired-item-limit: 50           # Max entries in player expired GUI          (-1 = unlimited)
  auction-cooldown: 5              # Seconds between creating new listings      (-1 = disabled)
  expire-time: 86400               # Seconds before a listing expires           (-1 = never, bypass: airauctions.bypass.expire-time.<#>)
  purge-time: -1                   # Seconds before an expired item is deleted from DB (-1 = disabled)

  # --- Listing ---
  confirm-auction: true            # Require confirmation before listing an item
  confirmation-expire-time: 60     # Seconds before a pending confirmation expires (-1 = disabled)
  broadcast-to-self: false         # If true, the seller also receives the global new-listing broadcast

  # Amount argument behaviour when running /ah sell:
  #   REQUIRED - player MUST specify an amount
  #   OPTIONAL - uses the in-hand stack size if no amount is given
  #   DISABLED - always lists the entire stack; amount argument is ignored
  amount-type: OPTIONAL

  # --- Removal ---
  confirm-remove: true             # Require confirmation before removing a listing
  remove-expire-time: 60           # Seconds before a pending remove confirmation expires (-1 = disabled)

  # --- Purchasing ---
  purchase-own: false              # Allow players to buy their own listings
  drop-items-when-full: true       # Drop purchased items on the ground if inventory is full

  # --- Sorting ---
  # Defines available sort modes and their display names.
  # Order here controls the order they appear in GUIs. Unused modes can be removed.
  sorting:
    newest-date: "Newest date"
    oldest-date: "Oldest date"
    highest-price: "Highest price"
    lowest-price: "Lowest price"
    alphabetical: "Alphabetical"
    amount: "Amount"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  COMMANDS
#  Requires a server restart for name/alias changes to apply
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
commands:
  main:
    name: "auctionhouse"
    aliases: [ah, auctions]
    usage: "/%label% [subcommand] [...]"

  subcommands:
    sell:
      enabled: true
      name: "sell"
      usage: "/%label% %sublabel% <price> [amount]"
    listings:
      enabled: true
      name: "listings"
      usage: "/%label% %sublabel%"
    expired:
      enabled: true
      name: "expired"
      usage: "/%label% %sublabel%"
    history:
      enabled: true
      name: "history"
      usage: "/%label% %sublabel%"
      usage-others: "/%label% %sublabel% [player]"
    search:
      enabled: true
      name: "search"
      usage: "/%label% %sublabel% <query>"
    view-player:
      enabled: true
      name: "player"
      usage: "/%label% %sublabel% <player>"
    open:
      enabled: true
      name: "open"
      usage: "/%label% %sublabel% <gui-id> <filter> <sort>"
      usage-others: "/%label% %sublabel% <gui-id> <filter> <sort> [player]"
    remove:
      enabled: true
      name: "remove"
      usage: "/%label% %sublabel% <id>"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  RESTRICTIONS
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
restrictions:
  # Gamemodes in which players cannot create listings (bypass: airauctions.bypass.gamemodes)
  blocked-gamemodes:
    - CREATIVE
    - SPECTATOR

  # Worlds in which players cannot create listings (bypass: airauctions.bypass.worlds)
  disabled-worlds:
    - "disabled_world"

  allow-damaged-items: true        # Allow listing of damaged items (bypass: airauctions.bypass.damageditems)
  max-query-length: 32             # Maximum character length for search queries

  # --- Item Blacklist ---
  # Defines which items cannot be listed. (bypass: airauctions.bypass.blacklist)
  # Set as-whitelist: true to invert — only matching items will be allowed.
  item-blacklist:
    as-whitelist: false

    # Match by Bukkit Material name
    materials: []
    #  - COMMAND_BLOCK
    #  - BEDROCK
    #  - BARRIER

    # Match by display name or lore (partial match, color-insensitive)
    # Lore syntax: "line_index:text" to target a specific line, or "text" to search all lines
    names: []
    #  - "Soulbound Item"
    #  - "Quest Item"
    lores: []
    #  - "0:Not for Sale"
    #  - "Soulbound"

    # Match by enchantment (any level) or enchantment + level
    # Syntax: "ENCHANT_NAME" or "ENCHANT_NAME:LEVEL"
    enchantments: []
    #  - "BINDING_CURSE"
    #  - "VANISHING_CURSE:1"

    # Match by NBT key, Custom Model Data, or Item Model
    # Model syntax: "DATA" (any material) or "MATERIAL:DATA"
    nbt-keys: []
    #  - "undroppable"
    #  - "unique_id"
    custom-model-data: []
    #  - "1005"
    #  - "PAPER:1002"
    item-models: []
    #  - "custom:mymodel/admin_pickaxe"
    #  - "minecraft:broken_shield"

    # Match Nexo or ItemsAdder items by their plugin ID
    special-items: []
    #  - "nexo:item_id"
    #  - "itemsadder:item_id"

    # Match exact item stacks by combining multiple criteria (advanced)
    specific-items: []
    #  example_restriction:
    #    material: STICK
    #    name: "Admin Stick"
    #    glow: true